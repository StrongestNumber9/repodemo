name: trigger

on: [ push ]
permissions: write-all
jobs:
  create_repo:
    runs-on: ubuntu-latest
    steps:
      - name: dl
        run: |
          gh release download --repo "teragrep/rlp_10" --pattern "*.rpm" --dir "rpm" "1.0.0";
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Update
        uses: StrongestNumber9/dfg_01@make_proxyable
        with:
          from_repository: "${{ github.repository }}"
          from_version: "${{ github.run_id }}"
          to_repository: "${{ github.repository_owner }}/pkg_01"
          to_path: "links/absolute"
          deploy_key: "${{ secrets.PKG_01_DEPLOY_KEY }}"
          files: rpm/*.rpm
          gpg_public_key: "${{ secrets.RPM_SIGNING_PUBLIC_KEY }}"
          repo_name: links-absolute
          absolute_links: true
        env:
          has_deploy_key: ${{ secrets.PKG_01_DEPLOY_KEY != '' }}
        if: ${{ env.has_deploy_key == 'true' }}
      - name: Update
        uses: StrongestNumber9/dfg_01@make_proxyable
        with:
          from_repository: "${{ github.repository }}"
          from_version: "${{ github.run_id }}"
          to_repository: "${{ github.repository_owner }}/pkg_01"
          to_path: "links/absolute-unset"
          deploy_key: "${{ secrets.PKG_01_DEPLOY_KEY }}"
          files: rpm/*.rpm
          gpg_public_key: "${{ secrets.RPM_SIGNING_PUBLIC_KEY }}"
          repo_name: links-absolute-unset
        env:
          has_deploy_key: ${{ secrets.PKG_01_DEPLOY_KEY != '' }}
        if: ${{ env.has_deploy_key == 'true' }}
      - name: Update
        uses: StrongestNumber9/dfg_01@make_proxyable
        with:
          from_repository: "${{ github.repository }}"
          from_version: "${{ github.run_id }}"
          to_repository: "${{ github.repository_owner }}/pkg_01"
          to_path: "links/relative-unset"
          deploy_key: "${{ secrets.PKG_01_DEPLOY_KEY }}"
          files: rpm/*.rpm
          gpg_public_key: "${{ secrets.RPM_SIGNING_PUBLIC_KEY }}"
          repo_name: links-relative-unset
          repo_baseurl: "http://127.0.0.1:8081/repository/teragrep/"
          absolute_links: false
        env:
          has_deploy_key: ${{ secrets.PKG_01_DEPLOY_KEY != '' }}
        if: ${{ env.has_deploy_key == 'true' }}
      - name: Update
        uses: StrongestNumber9/dfg_01@make_proxyable
        with:
          from_repository: "${{ github.repository }}"
          from_version: "${{ github.run_id }}"
          to_repository: "${{ github.repository_owner }}/pkg_01"
          to_path: "links/relative-unappended"
          deploy_key: "${{ secrets.PKG_01_DEPLOY_KEY }}"
          files: rpm/*.rpm
          gpg_public_key: "${{ secrets.RPM_SIGNING_PUBLIC_KEY }}"
          repo_name: links-relative-unappended
          repo_baseurl: "http://127.0.0.1:8081/repository/teragrep/"
          repo_baseurl_append_path: false
          absolute_links: false
        env:
          has_deploy_key: ${{ secrets.PKG_01_DEPLOY_KEY != '' }}
        if: ${{ env.has_deploy_key == 'true' }}
      - name: Update
        uses: StrongestNumber9/dfg_01@make_proxyable
        with:
          from_repository: "${{ github.repository }}"
          from_version: "${{ github.run_id }}"
          to_repository: "${{ github.repository_owner }}/pkg_01"
          to_path: "links/relative-appended"
          deploy_key: "${{ secrets.PKG_01_DEPLOY_KEY }}"
          files: rpm/*.rpm
          gpg_public_key: "${{ secrets.RPM_SIGNING_PUBLIC_KEY }}"
          repo_name: links-relative-appended
          repo_baseurl: "http://127.0.0.1:8081/repository/teragrep/"
          repo_baseurl_append_path: true
          absolute_links: false
        env:
          has_deploy_key: ${{ secrets.PKG_01_DEPLOY_KEY != '' }}
        if: ${{ env.has_deploy_key == 'true' }}
